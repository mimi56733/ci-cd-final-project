apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: lint
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        pip install flake8
        flake8 . --max-line-length=120
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: tests
spec:
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: PYTHONPATH
          value: $(workspaces.source.path)
      script: |
        #!/bin/bash
        pip install pytest
        pytest
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-image
spec:
  params:
    - name: IMAGE
      type: string
  workspaces:
    - name: source
  steps:
    - name: build
      image: quay.io/buildah/stable:v1.17.0
      workingDir: $(workspaces.source.path)
      securityContext:
        privileged: true
      script: |
        #!/bin/bash
        buildah bud -t $(params.IMAGE) .
        buildah push $(params.IMAGE)
