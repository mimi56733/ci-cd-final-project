apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:3.18
      script: |
        #!/bin/sh
        echo "Cleaning workspace"
        rm -rf $(workspaces.source.path)/*
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: flake8
      image: python:3.9
      workingDir: $(workspaces.source.path)
      script: |
        pip install flake8
        flake8 .
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: tests
spec:
  workspaces:
    - name: source
  steps:
    - name: nose
      image: python:3.9
      workingDir: $(workspaces.source.path)
      script: |
        pip install nose pytest
        pytest